<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Agendar Consulta</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f5f5f5;
            padding:40px;
        }

        .container{
            max-width:500px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
        }

        label{
            display:block;
            margin-top:15px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
        }

        button{
            margin-top:25px;
            width:100%;
            padding:12px;
            background:#2b7cff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#1d5fd0;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Agendar Consulta</h2>

    <p>

        <strong>Hospital escolhido:</strong>

        {{ hospital }}

    </p>

    <form action="/agendar" method="POST">

        <input
            type="hidden"
            name="hospital"
            value="{{ hospital }}"
        >

        <label>Data</label>

        <input
            type="date"
            name="data"
            required
        >

        <label>Horário</label>

        <input
            type="time"
            name="hora"
            required
        >

        <button type="submit">

            Confirmar Agendamento

        </button>

    </form>

</div>

</body>

</html>
