<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Agendar Consulta</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:linear-gradient(135deg,#2D7F62,#1ab780);

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:30px;

        }

        .card{

            width:100%;
            max-width:650px;

            background:white;

            border-radius:20px;

            padding:40px;

            box-shadow:0 20px 45px rgba(0,0,0,.25);

        }

        h1{

            text-align:center;

            color:#2D7F62;

            margin-bottom:10px;

        }

        p{

            text-align:center;

            color:#666;

            margin-bottom:30px;

        }

        label{

            display:block;

            margin-top:20px;

            margin-bottom:8px;

            font-weight:bold;

            color:#333;

        }

        input,
        select{

            width:100%;

            padding:14px;

            border:2px solid #b2f2bc;

            border-radius:10px;

            font-size:16px;

            transition:.3s;

        }

        input:focus,
        select:focus{

            outline:none;

            border-color:#2D7F62;

            box-shadow:0 0 8px rgba(4, 100, 23, 0.35);

        }

        button{

            width:100%;

            margin-top:35px;

            padding:15px;

            border:none;

            border-radius:12px;

            background:#2D7F62;

            color:white;

            font-size:18px;

            cursor:pointer;

            font-weight:bold;

            transition:.3s;

        }

        button:hover{

            background:#6eb59c;

            transform:translateY(-3px);

        }

        .icone{

            font-size:70px;

            text-align:center;

            margin-bottom:15px;

        }

        .hospital{

            background:#e7f6e7;

            border:2px solid #2D7F62;

            border-radius:12px;

            padding:15px;

            margin-bottom:15px;

            color:#333;

            font-weight:bold;

            text-align:center;

        }

        .voltar{

            text-align:center;

            margin-top:20px;

        }

        .voltar a{

            text-decoration:none;

            color:#2D7F62;

            font-weight:bold;

        }

        .voltar a:hover{

            text-decoration:underline;

        }

    </style>

</head>

<body>

<div class="card">

    <div class="icone">

        🩺

    </div>

    <h1>

        Agendar Consulta

    </h1>

    <p>

        Escolha a especialidade, data e horário da consulta.

    </p>

    <div class="hospital">

        🏥 {{ hospital }}

    </div>

    <form action="/agendar" method="POST">

        <input
            type="hidden"
            name="hospital"
            value="{{ hospital }}"
        >

        <label>

            👨‍⚕️ Especialidade

        </label>

        <select
            name="especialidade"
            required
        >

            <option value="">

                Selecione...

            </option>

            <option>Clínico Geral</option>

            <option>Cardiologia</option>

            <option>Dermatologia</option>

            <option>Endocrinologia</option>

            <option>Gastroenterologia</option>

            <option>Ginecologia</option>

            <option>Neurologia</option>

            <option>Nutrição</option>

            <option>Oftalmologia</option>

            <option>Ortopedia</option>

            <option>Otorrinolaringologia</option>

            <option>Pediatria</option>

            <option>Pneumologia</option>

            <option>Psiquiatria</option>

            <option>Psicologia</option>

            <option>Reumatologia</option>

            <option>Urologia</option>

        </select>

        <label>

            📅 Data

        </label>

        <input
            type="date"
            name="data"
            required
        >

        <label>

            🕒 Horário

        </label>

        <input
            type="time"
            name="hora"
            required
        >

        <button
            type="submit"
        >

            Confirmar Agendamento

        </button>

    </form>

    <div class="voltar">

        <a href="/hospitais">

            ← Voltar aos Hospitais

        </a>

    </div>

</div>

</body>

</html>
