<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>

    <!-- Bootstrap 5.3.0 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Seu CSS customizado -->
   <link
  rel="stylesheet"
  href="{{ url_for('static', filename='cadastro.css') }}"/>
  </head>

  <body>
    <!-- Navbar (Você pode substituir pelo componente real do Bootstrap depois) -->
    <nav class="cabeçalho navbar navbar-expand-lg navbar-light bg-light px-3">
      <span class="navbar-brand">Navbar</span>
    </nav>

    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 80vh"
    >
      <div
        class="box p-4 border rounded shadow-sm bg-white"
        style="width: 100%; max-width: 400px"
      >
        <h2 class="text-center mb-4">Cadastro</h2>

        <!-- Ajuste: Adicionado action para a rota do Flask (ex: /auth/cadastro ou /cadastro) -->
        <form action="/cadastro" method="POST">
          <!-- Ajuste: Classe alterada para form-control e adicionado required -->
          <div class="mb-3">
            <input
              class="form-control nome"
              name="nome"
              type="text"
              placeholder="Nome Completo"
              required
            />
          </div>

          <div class="mb-3">
            <input
              class="form-control email"
              name="email"
              type="email"
              placeholder="Email"
              required
            />
          </div>

          <div class="mb-3">
            <input
              class="form-control senha"
              name="senha"
              type="password"
              placeholder="Senha"
              required
            />
          </div>

          <!-- Ajuste: Adicionado type="submit" e classes de botão do Bootstrap -->
          <button type="submit" class="btn btn-primary w-100 btn-cadastro">
            Cadastrar
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
