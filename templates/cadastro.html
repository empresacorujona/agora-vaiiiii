<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro - OwlConvenial</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:linear-gradient(135deg,#00BCD4,#0097A7);

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:30px;

        }

        .card{

            width:100%;
            max-width:520px;

            background:rgba(255,255,255,.96);

            border-radius:20px;

            padding:40px;

            box-shadow:0 20px 40px rgba(0,0,0,.25);

            text-align:center;

        }

        .logo{

            font-size:70px;

            margin-bottom:15px;

        }

        h1{

            color:#00ACC1;

            margin-bottom:10px;

            font-size:34px;

        }

        p{

            color:#666;

            margin-bottom:30px;

        }

        .grupo{

            margin-bottom:20px;

            text-align:left;

        }

        label{

            display:block;

            margin-bottom:8px;

            font-weight:bold;

            color:#444;

        }

        input{

            width:100%;

            padding:14px;

            border:2px solid #B2EBF2;

            border-radius:10px;

            font-size:16px;

            transition:.3s;

        }

        input:focus{

            outline:none;

            border-color:#00BCD4;

            box-shadow:0 0 8px rgba(0,188,212,.35);

        }

        button{

            width:100%;

            padding:15px;

            margin-top:15px;

            border:none;

            border-radius:12px;

            background:#00BCD4;

            color:white;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            background:#0097A7;

            transform:translateY(-3px);

        }

        .login{

            margin-top:25px;

            color:#666;

        }

        .login a{

            color:#0097A7;

            text-decoration:none;

            font-weight:bold;

        }

        .login a:hover{

            text-decoration:underline;

        }

        @media(max-width:600px){

            .card{

                padding:30px;

            }

            h1{

                font-size:28px;

            }

        }

    </style>

</head>

<body>

    <div class="card">

        <div class="logo">

            🦉

        </div>

        <h1>

            OwlConvenial

        </h1>

        <p>

            Crie sua conta e encontre hospitais próximos com facilidade.

        </p>

        <form action="/cadastro" method="POST">

            <div class="grupo">

                <label>Nome Completo</label>

                <input
                    type="text"
                    name="nome"
                    placeholder="Digite seu nome"
                    required
                >

            </div>

            <div class="grupo">

                <label>E-mail</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Digite seu e-mail"
                    required
                >

            </div>

            <div class="grupo">

                <label>Senha</label>

                <input
                    type="password"
                    name="senha"
                    placeholder="Digite sua senha"
                    required
                >

            </div>

            <button type="submit">

                Criar Conta

            </button>

        </form>

        <div class="login">

            Já possui uma conta?

            <a href="/login">

                Entrar

            </a>

        </div>

    </div>

</body>

</html>
