<!DOCTYPE html>
<html>
<head>

<title>Cadastro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Cadastro</h2>

<form method="POST">

<input
class="form-control mb-3"
name="nome"
placeholder="Nome">

<input
class="form-control mb-3"
name="email"
type="email"
placeholder="Email">

<input
class="form-control mb-3"
name="senha"
type="password"
placeholder="Senha">

<button
class="btn btn-success">
Cadastrar
</button>

</form>

</div>

</body>
</html>
