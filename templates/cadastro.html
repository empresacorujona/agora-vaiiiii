<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/cadastro.css') }}"
    >
  </head>

  <body>
    <header class="cabecalho">
      <a href="{{ url_for('hospital.html') }}" class="logo">
        <img
          src="{{ url_for('static', filename='templates/static/Assets/img/logo.png') }}"
          alt="Owl Convenial"
          class="logo"/>
      </a>
    </header>

    <main class="container-principal">
      <div class="box">
        <h2>Cadastro</h2>

        <form action="/cadastro" method="POST">
          <div class="mb-3">
            <input
              class="form-control"
              name="nome"
              type="text"
              placeholder="Nome Completo"
              required
            />
          </div>

          <div class="mb-3">
            <input
              class="form-control"
              name="email"
              type="email"
              placeholder="Email"
              required
            />
          </div>

          <div class="mb-3">
            <input
              class="form-control"
              name="senha"
              type="password"
              placeholder="Senha"
              required
            />
          </div>

          <button type="submit" class="btn-cadastro">Cadastrar</button>
        </form>
      </div>
    </main>
  </body>
</html>
