<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owl Convenial+</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="static/inicio.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">

        <div class="logo">
            <img src="static/imagens/logo.png" alt="Logo Owl Convenial">
        </div>

        <a href="#" class="area-paciente">
            Área do Paciente →
        </a>

    </header>


    <!-- Barra de progresso -->
    <div class="progress-bar">
        <div class="progress"></div>
    </div>


    <!-- HERO -->
    <main class="hero">

        <div class="hero-image">

            <div class="medical-icon">
                ❤️
            </div>

        </div>


        <h1>
            Agende sua consulta com facilidade
        </h1>


        <p>
            Informe seus dados, escolha a especialidade e receba a confirmação do seu atendimento em minutos.
        </p>


        <div class="buttons">

            <button class="btn-primary">
                ▶ Agendar Consulta
            </button>


            <button class="btn-secondary">
                👤 Área do Paciente
            </button>

        </div>

    </main>


    <!-- Barra de confiança -->

    <section class="trust-bar">

        <div class="trust-item">
            🔒 Seus dados são protegidos
        </div>

        <div class="trust-item">
            ✅ Sem filas
        </div>

        <div class="trust-item">
            📋 Atendimento rápido
        </div>

    </section>

</body>
</html>
